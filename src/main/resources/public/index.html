<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Library Management</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header>
      <h1>Library Management</h1>
      <nav>
        <a href="#books" id="tab-books" class="active">Books</a>
        <a href="#add-book" id="tab-add-book">Add Book</a>
        <a href="#members" id="tab-members">Members</a>
        <a href="#add-member" id="tab-add-member">Add Member</a>
        <a href="#issue-loan" id="tab-issue">Issue Loan</a>
        <a href="#return-loan" id="tab-return">Return Loan</a>
        <a href="#issued" id="tab-issued">Issued Loans</a>
        <a href="#returned" id="tab-returned">Returned Loans</a>
      </nav>
    </header>
    <main>
      <section id="view-books" class="view visible">
        <h2>Books</h2>
        <div id="books-list" class="card-grid"></div>
      </section>
      <section id="view-add-book" class="view">
        <h2>Add Book</h2>
        <form id="form-add-book" class="form">
          <div class="row"><label>ISBN</label><input type="text" id="isbn" required></div>
          <div class="row"><label>Title</label><input type="text" id="title" required></div>
          <div class="row"><label>Author</label><input type="text" id="author" required></div>
          <div class="row"><label>Copies Total</label><input type="number" id="copiesTotal" min="1" value="1" required></div>
          <button type="submit">Add Book</button>
          <div id="add-book-result" class="result"></div>
        </form>
      </section>
      <section id="view-members" class="view">
        <h2>Members</h2>
        <div id="members-list" class="card-grid"></div>
      </section>
      <section id="view-add-member" class="view">
        <h2>Add Member</h2>
        <form id="form-add-member" class="form">
          <div class="row"><label>Name</label><input type="text" id="m-name" required></div>
          <div class="row"><label>Email</label><input type="email" id="m-email" required></div>
          <div class="row"><label>Phone</label><input type="text" id="m-phone"></div>
          <button type="submit">Add Member</button>
          <div id="add-member-result" class="result"></div>
        </form>
      </section>
      <section id="view-issue-loan" class="view">
        <h2>Issue Loan</h2>
        <form id="form-issue-loan" class="form">
          <div class="row"><label>Book ID</label><input type="number" id="loan-book-id" required></div>
          <div class="row"><label>Member ID</label><input type="number" id="loan-member-id" required></div>
          <div class="row"><label>Due in days</label><input type="number" id="loan-days" min="1" value="14" required></div>
          <button type="submit">Issue</button>
          <div id="issue-loan-result" class="result"></div>
        </form>
      </section>
      <section id="view-return-loan" class="view">
        <h2>Return Loan</h2>
        <form id="form-return-loan" class="form">
          <div class="row"><label>Loan ID</label><input type="number" id="return-loan-id" required></div>
          <button type="submit">Return</button>
          <div id="return-loan-result" class="result"></div>
        </form>
      </section>
      <section id="view-issued" class="view">
        <h2>Issued Loans</h2>
        <div id="issued-list" class="card-grid"></div>
      </section>
      <section id="view-returned" class="view">
        <h2>Returned Loans</h2>
        <div id="returned-list" class="card-grid"></div>
      </section>
    </main>
    <footer>
      <span>© Library</span>
    </footer>
    <script src="/script.js"></script>
  </body>
  </html>
